<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Keep Focus</title>
  <link rel="icon" type="image/png" href="../icons/icon32.png" id="favicon">
  <script src="../dist/scripts/dark-mode-init.js"></script>
  <link rel="stylesheet" href="../styles/shared.css">
  <link rel="stylesheet" href="../styles/standalone.css">
</head>
<body>
  <div class="app-container">
    <!-- Permanent Sidebar -->
    <div class="sidebar-wrapper">
      <aside class="sidebar">
      <div class="sidebar-content">
        <div class="sidebar-header">
          <img src="../icons/icon96.png" alt="Keep Focus" class="sidebar-icon" id="sidebarIcon">
          <h1 class="sidebar-title">Keep Focus</h1>
        </div>
        <p class="sidebar-subtitle">Build better focus habits, one decision at a time</p>
        
        <nav class="sidebar-nav">
          <button class="sidebar-tab-button active" data-tab="blocked-sites">Blocked Sites</button>
          <button class="sidebar-tab-button" data-tab="screen-limits">Screen Limits</button>
          <button class="sidebar-tab-button" data-tab="element-blocking">Element Blocking</button>
          <button class="sidebar-tab-button" data-tab="settings">Settings</button>
        </nav>
      </div>
    </aside>
    </div>

    <!-- Main Content Area -->
    <main class="main-content">
      <div class="tabs-container">

        <!-- Blocked Sites Tab -->
        <div class="tab-content active" id="blocked-sites-tab">
          <h2 class="page-title">Blocked Sites</h2>
          <div class="blocked-sites-section">
            <div class="input-group">
              <input 
                type="text" 
                id="siteInput" 
                placeholder="Add domain or URL"
                autocomplete="off"
              >
              <button id="addBtn" class="btn-primary">Add</button>
            </div>
            <div class="block-option">
              <label class="checkbox-label">
                <input type="checkbox" id="blockChildrenCheckbox" checked>
                <span>Block all subpages/children pages</span>
              </label>
            </div>
            
            <div class="blocked-list-wrapper" id="blockedListWrapper">
              <ul id="blockedList" class="blocked-list">
                <!-- Sites will be dynamically added here -->
              </ul>
            </div>
          </div>
        </div>

        <!-- Screen Limits Tab -->
        <div class="tab-content" id="screen-limits-tab">
          <h2 class="page-title">Screen Limits</h2>
          <div class="screen-limits-section">
            <div class="input-group">
              <input 
                type="text" 
                id="timeLimitSiteInput" 
                placeholder="Add domain or URL"
                autocomplete="off"
              >
              <input 
                type="number" 
                id="timeLimitMinutesInput" 
                placeholder="Minutes"
                min="1"
                autocomplete="off"
                class="time-limit-input"
              >
              <button id="addTimeLimitBtn" class="btn-primary">Add</button>
            </div>
            
            <div class="blocked-list-wrapper" id="timeLimitsListWrapper">
              <ul id="timeLimitsList" class="blocked-list">
                <!-- Time limits will be dynamically added here -->
              </ul>
            </div>
          </div>
        </div>

        <!-- Element Blocking Tab -->
        <div class="tab-content" id="element-blocking-tab">
          <h2 class="page-title">Element Blocking</h2>
          <div class="settings-section">
            <div class="site-blocking-section">
              <h3 class="section-title">YouTube</h3>
              <div class="setting-item">
                <div class="dark-mode-setting">
                  <span class="toggle-label-text">Block Shorts</span>
                  <label class="toggle-switch-label" title="Block YouTube Shorts">
                    <div class="toggle-switch">
                      <input type="checkbox" id="youtubeShortsToggle" data-option="shorts">
                      <span class="toggle-slider"></span>
                    </div>
                  </label>
                </div>
              </div>
              <div class="setting-item">
                <div class="dark-mode-setting">
                  <span class="toggle-label-text">Block Suggested Videos</span>
                  <label class="toggle-switch-label" title="Block suggested videos in sidebar">
                    <div class="toggle-switch">
                      <input type="checkbox" id="youtubeSuggestedToggle" data-option="suggestedVideos">
                      <span class="toggle-slider"></span>
                    </div>
                  </label>
                </div>
              </div>
              <div class="setting-item">
                <div class="dark-mode-setting">
                  <span class="toggle-label-text">Block Ads</span>
                  <label class="toggle-switch-label" title="Block YouTube ads">
                    <div class="toggle-switch">
                      <input type="checkbox" id="youtubeAdsToggle" data-option="ads">
                      <span class="toggle-slider"></span>
                    </div>
                  </label>
                </div>
              </div>
              <div class="setting-item">
                <div class="dark-mode-setting">
                  <span class="toggle-label-text">Block Comments</span>
                  <label class="toggle-switch-label" title="Block YouTube comments">
                    <div class="toggle-switch">
                      <input type="checkbox" id="youtubeCommentsToggle" data-option="comments">
                      <span class="toggle-slider"></span>
                    </div>
                  </label>
                </div>
              </div>
              <div class="setting-item">
                <div class="dark-mode-setting">
                  <span class="toggle-label-text">Minimal Mode</span>
                  <label class="toggle-switch-label" title="Show only the video player">
                    <div class="toggle-switch">
                      <input type="checkbox" id="youtubeMinimalToggle" data-option="minimalMode">
                      <span class="toggle-slider"></span>
                    </div>
                  </label>
                </div>
              </div>
            </div>
          </div>
        </div>

        <!-- Settings Tab -->
        <div class="tab-content" id="settings-tab">
          <h2 class="page-title">Settings</h2>
          <div class="settings-section">
            <h3 class="section-title">Appearance</h3>
            <div class="setting-item">
              <div class="dark-mode-setting">
                <span class="toggle-label-text">Dark Mode</span>
                <label class="toggle-switch-label" title="Toggle dark mode">
                  <div class="toggle-switch">
                    <input type="checkbox" id="darkModeToggle">
                    <span class="toggle-slider"></span>
                  </div>
                </label>
              </div>
            </div>
          </div>
        </div>
      </div>
    </main>
  </div>
  <script type="module" src="../dist/scripts/standalone.js"></script>
</body>
</html>
