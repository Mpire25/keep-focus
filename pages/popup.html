<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Keep Focus</title>
  <script src="../scripts/dark-mode-init.js"></script>
  <link rel="stylesheet" href="../styles/shared.css">
  <link rel="stylesheet" href="../styles/popup.css">
</head>
<body>
  <div class="container">
    <header>
      <h1>Keep Focus</h1>
      <button class="external-link-btn" id="externalLinkBtn" title="Open extension page">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"></path>
          <polyline points="15 3 21 3 21 9"></polyline>
          <line x1="10" y1="14" x2="21" y2="3"></line>
        </svg>
      </button>
      <p class="subtitle">Build better focus habits, one decision at a time</p>
    </header>

    <div class="tabs-container">
      <div class="tabs-header">
        <button class="tab-button active" data-tab="blocked-sites">Blocked Sites</button>
        <button class="tab-button" data-tab="screen-limits">Screen Limits</button>
      </div>

      <div class="tab-content active" id="blocked-sites-tab">
        <div class="blocked-sites-section">
          <div class="input-group">
            <input 
              type="text" 
              id="siteInput" 
              placeholder="Add domain or URL"
              autocomplete="off"
            >
            <button id="addBtn" class="btn-primary">Add</button>
          </div>
          <div class="block-option">
            <label class="checkbox-label">
              <input type="checkbox" id="blockChildrenCheckbox" checked>
              <span>Block all subpages/children pages</span>
            </label>
          </div>
          
          <div class="blocked-list-wrapper" id="blockedListWrapper">
            <ul id="blockedList" class="blocked-list">
              <!-- Sites will be dynamically added here -->
            </ul>
          </div>
        </div>
      </div>

      <div class="tab-content" id="screen-limits-tab">
        <div class="screen-limits-section">
          <div class="input-group">
            <input 
              type="text" 
              id="timeLimitSiteInput" 
              placeholder="Add domain or URL"
              autocomplete="off"
            >
            <input 
              type="number" 
              id="timeLimitMinutesInput" 
              placeholder="Mins"
              min="1"
              autocomplete="off"
              class="time-limit-input"
            >
            <button id="addTimeLimitBtn" class="btn-primary">Add</button>
          </div>
          
          <div class="blocked-list-wrapper" id="timeLimitsListWrapper">
            <ul id="timeLimitsList" class="blocked-list">
              <!-- Time limits will be dynamically added here -->
            </ul>
          </div>
        </div>
      </div>
    </div>

    <div class="footer">
      <p class="atomic-habits-quote">"Focus is saying no to a thousand things."</p>
      <p class="quote-author">— Steve Jobs</p>
    </div>
  </div>
  <script src="../scripts/popup.js"></script>
</body>
</html>
