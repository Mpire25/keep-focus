<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Keep Focus</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <header>
      <h1>Keep Focus</h1>
      <p class="subtitle">Build better focus habits, one decision at a time</p>
      <div class="streak-section" id="streakSection" style="display: none;">
        <div class="streak-badge">
          <span class="streak-icon">🔥</span>
          <span class="streak-text">Focus streak: <strong id="streakCount">0</strong> sessions</span>
        </div>
      </div>
    </header>

    <div class="blocked-sites-section">
      <h2>Blocked Sites</h2>
      <div class="input-group">
        <input 
          type="text" 
          id="siteInput" 
          placeholder="Add domain or URL (e.g., twitter.com)"
          autocomplete="off"
        >
        <button id="addBtn" class="btn-primary">Add</button>
      </div>
      <div class="block-option">
        <label class="checkbox-label">
          <input type="checkbox" id="blockChildrenCheckbox" checked>
          <span>Block all subpages/children pages</span>
        </label>
      </div>
      
      <ul id="blockedList" class="blocked-list">
        <!-- Sites will be dynamically added here -->
      </ul>
    </div>

    <div class="footer">
      <p class="atomic-habits-quote">"Focus is saying no to a thousand things."</p>
      <p class="quote-author">— Steve Jobs</p>
    </div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
