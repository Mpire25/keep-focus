<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Keep Focus</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <header>
      <h1>Keep Focus</h1>
      <label class="dark-mode-toggle" title="Toggle dark mode">
        <input type="checkbox" id="darkModeToggle">
        <span class="toggle-icon">
          <svg class="moon-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
          </svg>
          <svg class="sun-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="5"></circle>
            <line x1="12" y1="1" x2="12" y2="3"></line>
            <line x1="12" y1="21" x2="12" y2="23"></line>
            <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
            <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
            <line x1="1" y1="12" x2="3" y2="12"></line>
            <line x1="21" y1="12" x2="23" y2="12"></line>
            <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
            <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
          </svg>
        </span>
      </label>
      <p class="subtitle">Build better focus habits, one decision at a time</p>
      <div class="streak-section" id="streakSection" style="display: none;">
        <div class="streak-badge">
          <span class="streak-icon">🔥</span>
          <span class="streak-text">Focus streak: <strong id="streakCount">0</strong> sessions</span>
        </div>
      </div>
    </header>

    <div class="blocked-sites-section">
      <h2>Blocked Sites</h2>
      <div class="input-group">
        <input 
          type="text" 
          id="siteInput" 
          placeholder="Add domain or URL (e.g., twitter.com)"
          autocomplete="off"
        >
        <button id="addBtn" class="btn-primary">Add</button>
      </div>
      <div class="block-option">
        <label class="checkbox-label">
          <input type="checkbox" id="blockChildrenCheckbox" checked>
          <span>Block all subpages/children pages</span>
        </label>
      </div>
      
      <ul id="blockedList" class="blocked-list">
        <!-- Sites will be dynamically added here -->
      </ul>
    </div>

    <div class="footer">
      <p class="atomic-habits-quote">"Focus is saying no to a thousand things."</p>
      <p class="quote-author">— Steve Jobs</p>
    </div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
